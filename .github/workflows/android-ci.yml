name: Android CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  mobile:
    name: Juicr Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Juicr Android

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib

  tv:
    name: Juicr TV
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Juicr TV

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib

  mobile-release-build:
    name: Juicr Android release build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: Juicr Android

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned release APK
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release

name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to rebuild or publish"
        required: true
        default: v1.0.1
      publish_release:
        description: "Attach APKs and update the GitHub release"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.release_tag }}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must start with v and include a version, for example v1.0.1."
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android release APKs
    needs: resolve-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Android release signing
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add release signing secrets before rebuilding a release."
              exit 1
            fi
          done

          mkdir -p "Juicr Android/android/app"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "Juicr Android/android/app/release-keystore.jks"
          {
            echo "storeFile=release-keystore.jks"
            echo "storePassword=$RELEASE_STORE_PASSWORD"
            echo "keyAlias=$RELEASE_KEY_ALIAS"
            echo "keyPassword=$RELEASE_KEY_PASSWORD"
          } > "Juicr Android/android/key.properties"

      - name: Install Android dependencies
        working-directory: Juicr Android
        run: flutter pub get

      - name: Build Android universal APK
        working-directory: Juicr Android
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release

      - name: Build Android ABI APKs
        working-directory: Juicr Android
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/symbols/juicr

      - name: Collect Android release APKs
        shell: bash
        run: |
          tag="${{ needs.resolve-release.outputs.tag }}"
          assets="$GITHUB_WORKSPACE/release-assets/$tag"
          outputs="$GITHUB_WORKSPACE/Juicr Android/build/app/outputs/flutter-apk"
          mkdir -p "$assets"

          cp "$outputs/app-release.apk" "$assets/juicr-android-${tag}-universal.apk"
          cp "$outputs/app-armeabi-v7a-release.apk" "$assets/juicr-android-${tag}-armeabi-v7a.apk"
          cp "$outputs/app-arm64-v8a-release.apk" "$assets/juicr-android-${tag}-arm64-v8a.apk"
          cp "$outputs/app-x86_64-release.apk" "$assets/juicr-android-${tag}-x86_64.apk"

          ls -lh "$assets"

      - name: Upload Android APK workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicr-${{ needs.resolve-release.outputs.tag }}-android-release-apks
          path: release-assets/${{ needs.resolve-release.outputs.tag }}/*.apk

  build-tv:
    name: Build TV release APKs
    needs: resolve-release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare TV release signing
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add release signing secrets before rebuilding a release."
              exit 1
            fi
          done

          mkdir -p "Juicr TV/android/app"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "Juicr TV/android/app/release-keystore.jks"
          {
            echo "storeFile=release-keystore.jks"
            echo "storePassword=$RELEASE_STORE_PASSWORD"
            echo "keyAlias=$RELEASE_KEY_ALIAS"
            echo "keyPassword=$RELEASE_KEY_PASSWORD"
          } > "Juicr TV/android/key.properties"

      - name: Install TV dependencies
        working-directory: Juicr TV
        run: flutter pub get

      - name: Build TV universal APK
        working-directory: Juicr TV
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release

      - name: Build TV ABI APKs
        working-directory: Juicr TV
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/symbols/juicr-tv

      - name: Collect TV release APKs
        shell: bash
        run: |
          tag="${{ needs.resolve-release.outputs.tag }}"
          assets="$GITHUB_WORKSPACE/release-assets/$tag"
          outputs="$GITHUB_WORKSPACE/Juicr TV/build/app/outputs/flutter-apk"
          mkdir -p "$assets"

          cp "$outputs/app-release.apk" "$assets/juicr-tv-${tag}-universal.apk"
          cp "$outputs/app-armeabi-v7a-release.apk" "$assets/juicr-tv-${tag}-armeabi-v7a.apk"
          cp "$outputs/app-arm64-v8a-release.apk" "$assets/juicr-tv-${tag}-arm64-v8a.apk"
          cp "$outputs/app-x86_64-release.apk" "$assets/juicr-tv-${tag}-x86_64.apk"

          ls -lh "$assets"

      - name: Upload TV APK workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicr-${{ needs.resolve-release.outputs.tag }}-tv-release-apks
          path: release-assets/${{ needs.resolve-release.outputs.tag }}/*.apk

  publish-release:
    name: Publish GitHub release
    needs:
      - resolve-release
      - build-android
      - build-tv
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || inputs.publish_release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release APK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: juicr-${{ needs.resolve-release.outputs.tag }}-*-release-apks
          path: release-assets/${{ needs.resolve-release.outputs.tag }}
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        run: |
          tag="${{ needs.resolve-release.outputs.tag }}"
          version="${{ needs.resolve-release.outputs.version }}"
          repo_root="$(git rev-parse --show-toplevel)"
          changelog="$repo_root/CHANGELOG.md"
          notes="$GITHUB_WORKSPACE/release-notes.md"
          previous_tag="$(git -C "$repo_root" describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"

          extract_section() {
            local section="$1"
            awk -v version="$version" -v wanted="$section" '
              BEGIN { in_version=0; in_section=0 }
              $0 ~ "^## \\[" version "\\]" { in_version=1; next }
              in_version && $0 ~ "^## \\[" { exit }
              in_version && $0 ~ "^### " {
                current = substr($0, 5)
                if (current == wanted) {
                  in_section = 1
                  next
                }
                if (in_section) exit
                next
              }
              in_section {
                if ($0 ~ "^### " || $0 ~ "^## \\[") exit
                print
              }
            ' "$changelog" | sed '/^[[:space:]]*$/d'
          }

          validate_section() {
            local section="$1"
            local body
            body="$(extract_section "$section")"
            if [ -z "$body" ]; then
              echo "::error::CHANGELOG.md is missing a populated '$section' section for $version."
              exit 1
            fi
            if printf '%s\n' "$body" | grep -Eiq '^- (None|Nothing queued|TBD|TODO)'; then
              echo "::error::CHANGELOG.md contains placeholder text in '$section' for $version."
              exit 1
            fi
          }

          write_section() {
            local section="$1"
            echo "## $section"
            echo
            extract_section "$section"
            echo
          }

          release_contributors() {
            local range
            if [ -n "$previous_tag" ]; then
              range="${previous_tag}..${tag}"
            else
              range="$tag"
            fi

            local contributors
            contributors="$(git -C "$repo_root" shortlog -s --no-merges "$range" | awk '{ $1=""; sub(/^ /, ""); print "- " $0 }')"
            if [ -n "$contributors" ]; then
              printf '%s\n' "$contributors"
            else
              echo "- Team Juicr"
            fi
          }

          validate_section Added
          validate_section Changed
          validate_section Fixed
          validate_section "Recent work"

          {
            write_section Added
            write_section Changed
            write_section Fixed
            write_section "Recent work"
            echo "## Contributors"
            echo
            release_contributors
          } > "$notes"

          cat "$notes"

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Juicr $TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "Juicr $TAG" --notes-file release-notes.md
          fi

          for legacy in \
            "juicr-${TAG}-universal.apk" \
            "juicr-${TAG}-armeabi-v7a.apk" \
            "juicr-${TAG}-arm64-v8a.apk" \
            "juicr-${TAG}-x86_64.apk"; do
            gh release delete-asset "$TAG" "$legacy" --yes >/dev/null 2>&1 || true
          done

          gh release upload "$TAG" \
            "release-assets/$TAG/juicr-android-${TAG}-universal.apk" \
            "release-assets/$TAG/juicr-android-${TAG}-armeabi-v7a.apk" \
            "release-assets/$TAG/juicr-android-${TAG}-arm64-v8a.apk" \
            "release-assets/$TAG/juicr-android-${TAG}-x86_64.apk" \
            "release-assets/$TAG/juicr-tv-${TAG}-universal.apk" \
            "release-assets/$TAG/juicr-tv-${TAG}-armeabi-v7a.apk" \
            "release-assets/$TAG/juicr-tv-${TAG}-arm64-v8a.apk" \
            "release-assets/$TAG/juicr-tv-${TAG}-x86_64.apk" \
            --clobber

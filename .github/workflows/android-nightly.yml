name: Android Nightly

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch or ref to build"
        required: true
        default: dev
      base_version:
        description: "Next stable version base"
        required: true
        default: "1.0.2"
      publish_prerelease:
        description: "Create or update a GitHub pre-release"
        required: true
        type: boolean
        default: true
permissions:
  contents: write

concurrency:
  group: android-nightly-${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'dev' }}
  cancel-in-progress: false

jobs:
  resolve-nightly:
    name: Resolve nightly build
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.inputs.outputs.source_ref }}
      source_sha: ${{ steps.nightly.outputs.source_sha }}
      tag: ${{ steps.nightly.outputs.tag }}
      version: ${{ steps.nightly.outputs.version }}
      version_code: ${{ steps.nightly.outputs.version_code }}
      base_version: ${{ steps.inputs.outputs.base_version }}
      publish_prerelease: ${{ steps.inputs.outputs.publish_prerelease }}
    steps:
      - name: Resolve nightly inputs
        id: inputs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            source_ref="${{ inputs.source_ref }}"
            base_version="${{ inputs.base_version }}"
            publish_prerelease="${{ inputs.publish_prerelease }}"
          else
            source_ref="dev"
            base_version="1.0.2"
            publish_prerelease="true"
          fi

          if [[ ! "$base_version" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Base version must be numeric, for example 1.0.2."
            exit 1
          fi

          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "publish_prerelease=$publish_prerelease" >> "$GITHUB_OUTPUT"

      - name: Checkout source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.inputs.outputs.source_ref }}
          fetch-depth: 0

      - name: Resolve source and nightly tag
        id: nightly
        shell: bash
        run: |
          base_version="${{ steps.inputs.outputs.base_version }}"
          nightly_date="$(date -u +%Y%m%d)"
          tag_prefix="v${base_version}-nightly.${nightly_date}."
          git fetch --tags --force
          last_slot="$(
            git tag -l "${tag_prefix}*" \
              | sed -E "s/^${tag_prefix//./\\.}([0-9]+)$/\1/" \
              | grep -E '^[0-9]+$' \
              | sort -n \
              | tail -1
          )"
          if [ -z "$last_slot" ]; then
            slot=1
          else
            slot=$((last_slot + 1))
          fi

          version_code_base="$(date -u +%y%m%d)"
          version_code=$((10#$version_code_base * 100 + slot))
          version="${base_version}-nightly.${nightly_date}.${slot}"
          tag="v${version}"
          source_sha="$(git rev-parse HEAD)"

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

  build-nightly:
    name: Build ${{ matrix.label }} nightly APKs
    needs: resolve-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: android
            label: Android
            app_dir: Juicr Android
            asset_prefix: juicr-android
            symbols_dir: juicr
          - lane: tv
            label: TV
            app_dir: Juicr TV
            asset_prefix: juicr-tv
            symbols_dir: juicr-tv
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-nightly.outputs.source_ref }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare release signing
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          APP_DIR: ${{ matrix.app_dir }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add release signing secrets before building nightlies."
              exit 1
            fi
          done

          mkdir -p "$APP_DIR/android/app"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$APP_DIR/android/app/release-keystore.jks"
          {
            echo "storeFile=release-keystore.jks"
            echo "storePassword=$RELEASE_STORE_PASSWORD"
            echo "keyAlias=$RELEASE_KEY_ALIAS"
            echo "keyPassword=$RELEASE_KEY_PASSWORD"
          } > "$APP_DIR/android/key.properties"

      - name: Apply nightly version
        shell: bash
        env:
          PUBSPEC: ${{ matrix.app_dir }}/pubspec.yaml
          NIGHTLY_VERSION: ${{ needs.resolve-nightly.outputs.version }}
          NIGHTLY_CODE: ${{ needs.resolve-nightly.outputs.version_code }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          pubspec = Path(os.environ["PUBSPEC"])
          version = os.environ["NIGHTLY_VERSION"]
          code = os.environ["NIGHTLY_CODE"]
          text = pubspec.read_text(encoding="utf-8")
          updated = re.sub(r"^version:\s*.+$", f"version: {version}+{code}", text, flags=re.MULTILINE)
          if text == updated:
            raise SystemExit(f"Could not update version in {pubspec}")
          pubspec.write_text(updated, encoding="utf-8")
          print(f"{pubspec}: version: {version}+{code}")
          PY

      - name: Install dependencies
        working-directory: ${{ matrix.app_dir }}
        run: flutter pub get

      - name: Build universal APK
        working-directory: ${{ matrix.app_dir }}
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release

      - name: Build ABI APKs
        working-directory: ${{ matrix.app_dir }}
        env:
          JUICR_BLOCK_UNTRUSTED_APP: "false"
          JUICR_RELEASE_BLOCK_UNTRUSTED_APP: "false"
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/symbols/${{ matrix.symbols_dir }}

      - name: Collect APKs
        shell: bash
        env:
          TAG: ${{ needs.resolve-nightly.outputs.tag }}
          APP_DIR: ${{ matrix.app_dir }}
          ASSET_PREFIX: ${{ matrix.asset_prefix }}
        run: |
          assets="$GITHUB_WORKSPACE/nightly-assets/$TAG"
          outputs="$GITHUB_WORKSPACE/$APP_DIR/build/app/outputs/flutter-apk"
          mkdir -p "$assets"

          cp "$outputs/app-release.apk" "$assets/${ASSET_PREFIX}-${TAG}-universal.apk"
          cp "$outputs/app-armeabi-v7a-release.apk" "$assets/${ASSET_PREFIX}-${TAG}-armeabi-v7a.apk"
          cp "$outputs/app-arm64-v8a-release.apk" "$assets/${ASSET_PREFIX}-${TAG}-arm64-v8a.apk"
          cp "$outputs/app-x86_64-release.apk" "$assets/${ASSET_PREFIX}-${TAG}-x86_64.apk"

          ls -lh "$assets"

      - name: Upload APK workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicr-${{ needs.resolve-nightly.outputs.tag }}-${{ matrix.lane }}-nightly-apks
          path: nightly-assets/${{ needs.resolve-nightly.outputs.tag }}/*.apk

  publish-nightly:
    name: Publish nightly pre-release
    needs:
      - resolve-nightly
      - build-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.resolve-nightly.outputs.publish_prerelease == 'true'
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-nightly.outputs.source_ref }}
          fetch-depth: 0

      - name: Download nightly APK artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: juicr-${{ needs.resolve-nightly.outputs.tag }}-*-nightly-apks
          path: nightly-assets/${{ needs.resolve-nightly.outputs.tag }}
          merge-multiple: true

      - name: Write nightly notes
        shell: bash
        env:
          TAG: ${{ needs.resolve-nightly.outputs.tag }}
          VERSION: ${{ needs.resolve-nightly.outputs.version }}
          BASE_VERSION: ${{ needs.resolve-nightly.outputs.base_version }}
          SOURCE_REF: ${{ needs.resolve-nightly.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.resolve-nightly.outputs.source_sha }}
        run: |
          short_sha="${SOURCE_SHA:0:7}"
          repo_root="$(git rev-parse --show-toplevel)"
          changelog="$repo_root/CHANGELOG.md"

          extract_section() {
            local section="$1"
            awk -v version="$BASE_VERSION" -v wanted="$section" '
              BEGIN { in_version=0; in_section=0 }
              $0 ~ "^## \\[" version "\\]" { in_version=1; next }
              in_version && $0 ~ "^## \\[" { exit }
              in_version && $0 ~ "^### " {
                current = substr($0, 5)
                if (current == wanted) {
                  in_section = 1
                  next
                }
                if (in_section) exit
                next
              }
              in_section {
                if ($0 ~ "^### " || $0 ~ "^## \\[") exit
                print
              }
            ' "$changelog" | sed '/^[[:space:]]*$/d'
          }

          release_contributors() {
            local contributors
            contributors="$(git -C "$repo_root" shortlog -s --no-merges "v1.0.1..HEAD" 2>/dev/null | awk '{ $1=""; sub(/^ /, ""); print "- " $0 }')"
            if [ -n "$contributors" ]; then
              printf '%s\n' "$contributors"
            else
              echo "- Team Juicr"
            fi
          }

          write_section() {
            local section="$1"
            local body
            body="$(extract_section "$section")"
            echo "## $section"
            echo
            if [ -n "$body" ]; then
              printf '%s\n' "$body"
            else
              case "$section" in
                Added)
                  echo "- Nightly Android and Android TV APKs are available from the dev branch for public testing before the next stable release."
                  echo "- The mobile Updates surface can show release checks and changelog details from GitHub releases."
                  echo "- Personal server catalog browsing now has safer recovery when a connected server returns an unexpectedly small first page."
                  ;;
                Changed)
                  echo "- Nightly tags now use date-local numbering, so each UTC day starts at .1 and increments only for that day."
                  echo "- Nightly release notes now follow the same Added, Changed, Fixed, Recent work, and Contributors shape as stable releases."
                  echo "- Personal server playback now resolves series and animation entries to a concrete playable episode before opening the native player."
                  ;;
                Fixed)
                  echo "- Personal server movie and series catalogs can recover from one-item browse pages without changing search behavior."
                  echo "- Release page clutter from run-number-based nightly tags is avoided for future nightly builds."
                  echo "- Update and diagnostics UI polish from dev is included for tester feedback before stable."
                  ;;
                "Recent work")
                  echo "- Built from \`$SOURCE_REF\` at \`$short_sha\`."
                  echo "- Includes current dev changes after stable \`v1.0.1\`."
                  echo "- Use the universal APK when unsure which device build to install."
                  ;;
              esac
            fi
            echo
          }

          {
            write_section Added
            write_section Changed
            write_section Fixed
            write_section "Recent work"
            echo "## Contributors"
            echo
            release_contributors
          } > nightly-notes.md

          cat nightly-notes.md

      - name: Publish GitHub pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve-nightly.outputs.tag }}
          VERSION: ${{ needs.resolve-nightly.outputs.version }}
          SOURCE_SHA: ${{ needs.resolve-nightly.outputs.source_sha }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Juicr $VERSION Nightly" --notes-file nightly-notes.md --prerelease
          else
            gh release create "$TAG" --target "$SOURCE_SHA" --title "Juicr $VERSION Nightly" --notes-file nightly-notes.md --prerelease
          fi

          gh release upload "$TAG" nightly-assets/"$TAG"/*.apk --clobber

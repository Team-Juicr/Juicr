name: juicr_tv
description: Juicr TV app shell for remote-first browsing and guarded playback.
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_vlc_player: ^7.4.4
  shared_preferences: ^2.5.3
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  flutter_vlc_player:
    path: ../Juicr Android/local_plugins/flutter_vlc_player

flutter:
  uses-material-design: true
